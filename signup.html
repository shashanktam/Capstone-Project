<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel = "stylesheet" href = "signup.css">
</head>
<body>
    <div class = "main">
        <div class = "left">
            <img src = "boy1.png" height = "1000px">
            
        </div>
        
        
        <div class = "right">
            <h1 >LIBRIS</h1>
            <img src = "https://thumbs.dreamstime.com/b/academic-logo-educational-institutions-vector-illustration-professional-designed-featuring-sleek-modern-style-360115837.jpg" class = "logo" width = "150px" >
            <p>IIT Patna Study Material Exchange</p>

            <h2>Create Account</h2>
        
            <input type = "name" type = "text" placeholder = "Enter Name" required> 

            <input type = "email" type = "email" placeholder = "Enter Email Id " required>

            <input type = "password" type = "password" placeholder = "Enter Password" required>

            <input type = "password" type = "password" placeholder = "Confirm Password" required>
            
            <label>Date Of Birth</label>
            <input type = "data" name = "dob">
            
            <div class = "gender">
                <label>Gender:</label>
                <label><input type = "radio" name = "gender"> Male</label>
                <label><input type = "radio" name = "gender"> Female</label>
                <label><input type = "radio" name = "gender"> Other</label>
            </div>

           

            <label>Branch</label>
            <select>
                <option>BS AICS</option>
                <option>BS-MS AICS</option>
                <option>BS CSDA</option>
                <option>BS MS CSDA</option> 
                <option>BBA</option>
                 <option>MBA</option>

            </select>
            <label>Semester</label>
            <select>
                <option>Semester 1</option>
                <option>Semester 2</option>
                <option>Semester 3</option>
                <option>Semester 4</option> 
                <option>Semester 5</option>
                <option>Semester 6</option>
                <option>Semester 7</option>
                <option>Semester 8</option>
                <option>Semester 9</option>
                <option>Semester 10</option>
            </select>

            <button type = "ssignup">Sign Up</button>

            <p>Already Have An Account? <a href = "signin.html">Login</a></p>
        </div>

    </div>
</body>
</html>
