<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRIS - IIT Patna Study Material Exchange</title>
    <link rel = "stylesheet" href ="style.css">
</head>
<body>
    <div class="header">
        <h1 style="font-family:Arial">LIBRIS </h1>
        <img src = "logo.png" class = "logo" >
        <h2 style="margin:0px; font-family:Arial">IIT Patna Study Material Exchange </h2>
    </div>
    <div class="main">
        <img src = "boy.png" class = "leftimg">
        <form >
            <input type = "name" type = "text" placeholder = "Enter Name" required> 


            <input type = "email" type = "email" placeholder = "Enter Email id " required>


            <input type = "password" type = "password" placeholder = "Enter Password" required>
            
        </form>
        <img src = "girl.png" class = "rightimg">
    </div>
    <button type = "ssignin" class="btn-up">Sign In</button><br><br>
    <button type = "ssignup" class="btn-up">Sign Up</button>

</body>
</html>
